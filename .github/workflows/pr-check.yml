name: PR Check

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NDK_VERSION: r26d

jobs:
  linux:
    name: Linux Check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            llvm-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Configure Linux clang toolchain
        run: |
          echo "CLANG_PATH=$(command -v clang)" >> "$GITHUB_ENV"
          LIBCLANG_PATH="$(dirname "$(find /usr/lib -path '*/libclang.so*' | sort | tail -n1)")"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> "$GITHUB_ENV"
          printf '#include <stdbool.h>\n' | clang -E -x c - >/dev/null

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

  android:
    name: Android Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Install Android/Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip \
            perl

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run shared checks
        run: bun run check

      - name: Add Android Rust target
        run: rustup target add aarch64-linux-android

      - name: Configure Android OpenSSL toolchain
        run: |
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

          echo "Using NDK at $NDK"
          echo "Using toolchain bin at $TOOLCHAIN"

          echo "$TOOLCHAIN" >> "$GITHUB_PATH"

          sudo ln -sf "$TOOLCHAIN/aarch64-linux-android21-clang" /usr/local/bin/aarch64-linux-android-clang
          sudo ln -sf "$TOOLCHAIN/aarch64-linux-android21-clang++" /usr/local/bin/aarch64-linux-android-clang++
          sudo ln -sf "$TOOLCHAIN/llvm-ar" /usr/local/bin/aarch64-linux-android-ar
          sudo ln -sf "$TOOLCHAIN/llvm-ranlib" /usr/local/bin/aarch64-linux-android-ranlib

          {
            echo "ANDROID_NDK_HOME=$NDK"
            echo "ANDROID_NDK_ROOT=$NDK"
            echo "NDK_HOME=$NDK"
            echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang"
            echo "CXX_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang++"
            echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar"
            echo "RANLIB_aarch64_linux_android=$TOOLCHAIN/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android21-clang"
          } >> "$GITHUB_ENV"

      - name: Run Android Rust check
        working-directory: src-tauri
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          RUST_BACKTRACE: 1
        run: cargo check --target aarch64-linux-android

  macos:
    name: macOS Check
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

  windows:
    name: Windows Check
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Ensure Chocolatey
        shell: pwsh
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco --version

      - name: Install LLVM (libclang)
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check
