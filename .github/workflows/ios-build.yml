name: Build / Release / iOS

run-name: iOS release build by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method"
        required: true
        default: "ad-hoc"
        type: choice
        options:
          - development
          - ad-hoc
          - app-store
      version_override:
        description: "Optional Tauri/app version override for this release build"
        required: false
        default: ""
        type: string

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-latest
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Add Rust iOS targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Ensure iOS toolchain deps
        run: |
          xcode-select -p
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write Tauri version override
        if: ${{ inputs.version_override != '' }}
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          node -e "require('fs').writeFileSync('tauri-version-override.json', JSON.stringify({ version: process.env.VERSION_OVERRIDE }))"

      - name: Prepare ONNX Runtime iOS libs
        env:
          IOS_ORT_LIBS_URL: ${{ secrets.IOS_ORT_LIBS_URL }}
          IOS_ORT_LIBS_TGZ_BASE64: ${{ secrets.IOS_ORT_LIBS_TGZ_BASE64 }}
        run: |
          set -euo pipefail

          ARCHIVE="$RUNNER_TEMP/ort-ios.tgz"
          EXTRACT_ROOT="$RUNNER_TEMP/ort-ios"
          mkdir -p "$EXTRACT_ROOT"

          if [ -n "${IOS_ORT_LIBS_URL:-}" ]; then
            curl -fsSL "$IOS_ORT_LIBS_URL" -o "$ARCHIVE"
          elif [ -n "${IOS_ORT_LIBS_TGZ_BASE64:-}" ]; then
            printf '%s' "$IOS_ORT_LIBS_TGZ_BASE64" | base64 --decode > "$ARCHIVE"
          else
            echo "Missing iOS ONNX Runtime source. Set IOS_ORT_LIBS_URL or IOS_ORT_LIBS_TGZ_BASE64."
            exit 1
          fi

          tar -xzf "$ARCHIVE" -C "$EXTRACT_ROOT"

          CHILD_COUNT=$(find "$EXTRACT_ROOT" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')
          if [ "$CHILD_COUNT" -eq 1 ] && [ -d "$(find "$EXTRACT_ROOT" -mindepth 1 -maxdepth 1 | head -1)" ]; then
            ORT_LIB_LOCATION="$(find "$EXTRACT_ROOT" -mindepth 1 -maxdepth 1 | head -1)"
          else
            ORT_LIB_LOCATION="$EXTRACT_ROOT"
          fi

          echo "ORT_LIB_LOCATION=$ORT_LIB_LOCATION" >> "$GITHUB_ENV"
          echo "Using ORT_LIB_LOCATION=$ORT_LIB_LOCATION"

      - name: Init iOS project
        run: |
          INIT_ARGS=(ios init)
          if [ -f tauri-version-override.json ]; then
            INIT_ARGS+=(--config tauri-version-override.json)
          fi
          bun run tauri "${INIT_ARGS[@]}"

      - name: Import iOS signing assets
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${IOS_CERT_P12_BASE64:-}" ] || [ -z "${IOS_CERT_PASSWORD:-}" ] || [ -z "${IOS_PROFILE_BASE64:-}" ]; then
            echo "Missing iOS signing secrets. Required: IOS_CERT_P12_BASE64, IOS_CERT_PASSWORD, IOS_PROFILE_BASE64"
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          printf '%s' "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "IOS_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
            echo "IOS_PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Build and export IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
        run: |
          set -euo pipefail

          if [ -z "${IOS_TEAM_ID:-}" ] || [ -z "${IOS_BUNDLE_IDENTIFIER:-}" ]; then
            echo "Missing iOS metadata secrets. Required: IOS_TEAM_ID, IOS_BUNDLE_IDENTIFIER"
            exit 1
          fi

          WORKSPACE=$(find src-tauri/gen -name "*.xcworkspace" | head -1)
          if [ -z "${WORKSPACE:-}" ]; then
            echo "No Xcode workspace found under src-tauri/gen"
            exit 1
          fi

          xcodebuild -list -json -workspace "$WORKSPACE" > "$RUNNER_TEMP/xcode-list.json"
          SCHEME=$(python3 - <<'PY'
          import json, os
          path = os.path.join(os.environ["RUNNER_TEMP"], "xcode-list.json")
          with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)
            schemes = data.get("workspace", {}).get("schemes", [])
            if not schemes:
              raise SystemExit("No schemes found in workspace.")
              print(schemes[0])
              PY
              )

          DERIVED_DATA="$RUNNER_TEMP/ios-derived-data"
          ARCHIVE_PATH="$RUNNER_TEMP/LettuceAI.xcarchive"
          EXPORT_DIR="$RUNNER_TEMP/ios-export"
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ github.event.inputs.export_method }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild clean archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED_DATA" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

          IPA_PATH=$(find "$EXPORT_DIR" -name "*.ipa" | head -1)
          if [ -z "${IPA_PATH:-}" ]; then
            echo "Build/export completed but no .ipa was produced."
            exit 1
          fi

          echo "IOS_IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Built IPA at: $IPA_PATH"

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          if-no-files-found: error
          path: ${{ env.IOS_IPA_PATH }}
