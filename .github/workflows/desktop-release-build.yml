  windows_vulkan:
    name: Windows Build (Vulkan)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_windows == true }}
    runs-on: windows-latest
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
      WINDOWS_VULKAN_SDK_VERSION: "1.3.296.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Free runner disk space
        shell: pwsh
        run: |
          Write-Host "Disk usage before cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

          $paths = @(
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "C:\Strawberry",
            "C:\ghcup",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\hostedtoolcache\windows\PyPy",
            "C:\hostedtoolcache\windows\go",
            "C:\Program Files\Google\Chrome",
            "C:\Program Files (x86)\Microsoft\Edge",
            "C:\Program Files\Mozilla Firefox"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $p
            }
          }

          Write-Host "Disk usage after cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Ensure Chocolatey
        shell: pwsh
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco --version

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Install LLVM (libclang)
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $sdkVersion = $env:WINDOWS_VULKAN_SDK_VERSION
          if ([string]::IsNullOrWhiteSpace($sdkVersion)) {
            throw "WINDOWS_VULKAN_SDK_VERSION was not set."
          }

          $installerPath = Join-Path $env:RUNNER_TEMP "vulkan_sdk.exe"
          $downloadUrl = "https://sdk.lunarg.com/sdk/download/$sdkVersion/windows/vulkan_sdk.exe?Human=true"

          $filename = "VulkanSDK-$sdkVersion-Installer.exe"
          $shaUrl = "https://sdk.lunarg.com/sdk/sha/$sdkVersion/windows/$filename.json"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $installerPath

          $expectedSha = (Invoke-RestMethod -Uri $shaUrl).sha.ToLowerInvariant()
          $actualSha = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($expectedSha -ne $actualSha) {
            throw "Downloaded Vulkan SDK checksum mismatch for version $sdkVersion. Expected: $expectedSha, Actual: $actualSha"
          }

          $install = Start-Process `
            -FilePath $installerPath `
            -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install", "copy_only=1" `
            -NoNewWindow `
            -PassThru `
            -Wait
          if ($install.ExitCode -ne 0) {
            throw "Vulkan SDK installer exited with code $($install.ExitCode)."
          }

          $sdkRoot = Join-Path "C:\\VulkanSDK" $sdkVersion
          if (!(Test-Path $sdkRoot)) {
            throw "Expected Vulkan SDK install directory was not created: $sdkRoot"
          }

          "VULKAN_VERSION=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VK_SDK_PATH=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Vulkan SDK environment
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VULKAN_SDK)) {
            throw "VULKAN_SDK was not set by the Vulkan SDK installer"
          }

          $vulkanBin = Join-Path $env:VULKAN_SDK "Bin"
          $vulkanLib = Join-Path $env:VULKAN_SDK "Lib"
          $vulkanInclude = Join-Path $env:VULKAN_SDK "Include"

          foreach ($path in @($vulkanBin, $vulkanLib, $vulkanInclude)) {
            if (!(Test-Path $path)) {
              throw "Missing Vulkan SDK path: $path"
            }
          }

          "VK_SDK_PATH=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Vulkan_ROOT=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CPLUS_INCLUDE_PATH=$vulkanInclude" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIB=$vulkanLib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INCLUDE=$vulkanInclude;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $vulkanBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $glslc = Get-ChildItem -Path $vulkanBin -Filter "glslc*.exe" | Select-Object -First 1
          if ($null -eq $glslc) {
            throw "glslc executable not found under $vulkanBin"
          }

          $vulkanInfo = Get-ChildItem -Path $vulkanBin -Filter "vulkaninfo*.exe" | Select-Object -First 1
          if ($null -eq $vulkanInfo) {
            throw "vulkaninfo executable not found under $vulkanBin"
          }

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write Tauri version override
        if: ${{ inputs.version_override != '' }}
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          node -e "require('fs').writeFileSync('tauri-version-override.json', JSON.stringify({ version: process.env.VERSION_OVERRIDE }))"

      - name: Build with Vulkan
        env:
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
          CMAKE_GENERATOR: "Ninja"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
          CMAKE_VERBOSE: "1"
          CMAKE_VERBOSE_MAKEFILE: "ON"
          CMAKE_PROJECT_TOP_LEVEL_INCLUDES: "${{ github.workspace }}\\src-tauri\\cmake\\windows-vulkan-overrides.cmake"
          CARGO_BUILD_JOBS: "2"
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: "true"
          RUST_BACKTRACE: "1"
          CC: "cl.exe"
          CXX: "cl.exe"
          CMAKE_C_COMPILER: "cl.exe"
          CMAKE_CXX_COMPILER: "cl.exe"
          CXXFLAGS: "/EHsc"
          CARGO_TARGET_DIR: C:\t
        shell: pwsh
        run: |
          mkdir C:\t -ErrorAction SilentlyContinue | Out-Null
          echo "VULKAN_SDK=$env:VULKAN_SDK"
          $vulkanBin = Join-Path $env:VULKAN_SDK "Bin"
          if (!(Test-Path $vulkanBin)) {
            throw "Vulkan SDK bin directory not found: $vulkanBin"
          }

          $vulkanInfo = Get-ChildItem -Path $vulkanBin -Filter "vulkaninfo*.exe" | Select-Object -First 1
          if ($null -eq $vulkanInfo) {
            throw "vulkaninfo executable not found under $vulkanBin"
          }

          try {
            & $vulkanInfo.FullName --summary
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "vulkaninfo exited with code $LASTEXITCODE. Continuing because Vulkan runtime diagnostics are optional on CI runners."
            }
          } catch {
            Write-Warning "vulkaninfo failed: $($_.Exception.Message)"
            Write-Warning "Continuing because Vulkan runtime diagnostics are optional on CI runners."
          }
          $tauriArgs = @('run', 'tauri', 'build')
          if (Test-Path tauri-version-override.json) {
            $tauriArgs += @('--config', 'tauri-version-override.json')
          }
          $tauriArgs += @('--features', 'llama-gpu-vulkan')
          & bun $tauriArgs

      - name: Package Windows Vulkan zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path C:\t\release\bundle\* -DestinationPath dist-artifacts/windows-vulkan.zip -Force

      - name: Copy Windows Vulkan installers with stable names
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null

          $msi = Get-ChildItem -Path 'C:\t\release\bundle\msi' -Filter '*.msi' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            Copy-Item $msi.FullName 'dist-artifacts/lettuceai-windows-x64-vulkan.msi'
          }

          $nsis = Get-ChildItem -Path 'C:\t\release\bundle\nsis' -Filter '*.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $nsis) {
            Copy-Item $nsis.FullName 'dist-artifacts/lettuceai-windows-x64-vulkan-setup.exe'
          }

      - name: Upload Windows Vulkan artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            dist-artifacts/windows-vulkan.zip
            dist-artifacts/lettuceai-windows-x64-vulkan.msi
            dist-artifacts/lettuceai-windows-x64-vulkan-setup.exe
          fail_on_unmatched_files: true

