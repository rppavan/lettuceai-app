name: Build / Release / Desktop

run-name: Desktop release build by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Optional Tauri/app version override for this release build"
        required: false
        default: ""
        type: string
      build_llama_cuda_linux:
        description: "Also build Linux desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_vulkan_linux:
        description: "Also build Linux desktop with llama.cpp Vulkan support"
        required: false
        default: false
        type: boolean
      build_llama_cpu_linux:
        description: "Build Linux desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_cuda_windows:
        description: "Also build Windows desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_vulkan_windows:
        description: "Build Windows Vulkan version with llama.cpp Vulkan support"
        required: false
        default: false
        type: boolean
      build_llama_cpu_windows:
        description: "Build Windows desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_cpu_macos:
        description: "Build macOS desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_metal_macos:
        description: "Build macOS desktop with llama.cpp Metal support"
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-release-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  prepare_release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION_OVERRIDE='${{ inputs.version_override }}'

          if [[ -n "${VERSION_OVERRIDE}" ]]; then
            SAFE_VERSION="$(printf '%s' "${VERSION_OVERRIDE}" | tr -cs '[:alnum:]._-' '-')"
            SAFE_VERSION="${SAFE_VERSION#-}"
            SAFE_VERSION="${SAFE_VERSION%-}"
            TAG="desktop-release-${SAFE_VERSION}"
            NAME="Desktop Release ${VERSION_OVERRIDE}"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              TAG="${TAG}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
              NAME="${NAME} (${SHORT_SHA}, attempt ${GITHUB_RUN_ATTEMPT})"
            fi
          else
            TAG="desktop-release-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
            NAME="Desktop Release Build #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT} (${SHORT_SHA})"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build release body (include commits since last Desktop release build)
        id: release_body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          TAG_PREFIX="desktop-release"
          PREV_TAG=""

          print_commit_range() {
            local range="$1"
            local empty_message="$2"
            local count=0

            while IFS=$'\t' read -r sha subject; do
              [[ -z "$sha" ]] && continue
              short_sha="${sha:0:7}"
              echo "- [\`${short_sha}\`](${REPO_URL}/commit/${sha}) ${subject}"
              count=$((count + 1))
            done < <(git log --pretty=format:'%H%x09%s%n' "${range}")

            if [[ "${count}" -eq 0 ]]; then
              echo "- ${empty_message}"
            fi
          }

          PREV_SUCCESS_RUN_INFO="$(
            python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          workflow_ref = os.environ["GITHUB_WORKFLOW_REF"]
          workflow = workflow_ref.split("@", 1)[0].split("/")[-1]
          branch = os.environ["GITHUB_REF_NAME"]
          current_sha = os.environ["GITHUB_SHA"]
          current_run = int(os.environ["GITHUB_RUN_NUMBER"])
          current_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          token = os.environ.get("GH_TOKEN", "")

          params = urllib.parse.urlencode({
              "status": "completed",
              "event": "workflow_dispatch",
              "branch": branch,
              "per_page": 100,
          })
          url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs?{params}"

          headers = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          best = None
          best_same_sha = None
          for run in data.get("workflow_runs", []):
              if run.get("conclusion") != "success":
                  continue
              run_number = int(run.get("run_number") or 0)
              run_attempt = int(run.get("run_attempt") or 1)
              if run_number < current_run or (run_number == current_run and run_attempt < current_attempt):
                  key = (run_number, run_attempt)
                  if run.get("head_sha") == current_sha:
                      if best_same_sha is None or key > best_same_sha:
                          best_same_sha = key
                      continue
                  if best is None or key > best:
                      best = key

          if best is None:
              best = best_same_sha

          if best is not None:
              print(f"{best[0]}\t{best[1]}")
          PY
          )"
          if [[ -n "${PREV_SUCCESS_RUN_INFO}" ]]; then
            IFS=$'\t' read -r PREV_RUN PREV_ATTEMPT <<< "${PREV_SUCCESS_RUN_INFO}"
            PREV_TAG="$(git tag --list "${TAG_PREFIX}-${PREV_RUN}-${PREV_ATTEMPT}-*" --sort=-creatordate | head -n 1)"
            if [[ -z "${PREV_TAG}" ]]; then
              PREV_TAG="$(git tag --list "${TAG_PREFIX}-${PREV_RUN}-*" --sort=-creatordate | head -n 1)"
            fi
          fi

          BODY_DELIM="BODY_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          {
            echo "body<<${BODY_DELIM}"
            echo "Automated desktop release build artifacts for commit \`${GITHUB_SHA}\`."
            echo "Workflow run: ${REPO_URL}/actions/runs/${GITHUB_RUN_ID}"
            echo

            if [[ -n "$PREV_TAG" ]]; then
              PREV_SHA="$(git rev-list -n 1 "${PREV_TAG}")"
              echo "### Changes since previous Desktop release build \`${PREV_TAG}\`"
              echo "Compare: ${REPO_URL}/compare/${PREV_TAG}...${GITHUB_SHA}"
              echo

              if git merge-base --is-ancestor "${PREV_SHA}" "${GITHUB_SHA}"; then
                print_commit_range "${PREV_TAG}..${GITHUB_SHA}" "No new commits since the previous Desktop release build."
              elif git merge-base --is-ancestor "${GITHUB_SHA}" "${PREV_SHA}"; then
                echo "- This build is on an older commit than the previous Desktop release build."
                echo "- Commits in previous release build but not this build:"
                print_commit_range "${GITHUB_SHA}..${PREV_TAG}" "No differing commits found."
              else
                echo "- Current and previous Desktop release builds are on different branches."
                echo "- Commits only in this build:"
                print_commit_range "${PREV_TAG}..${GITHUB_SHA}" "No unique commits in this build."
                echo "- Commits only in previous release build:"
                print_commit_range "${GITHUB_SHA}..${PREV_TAG}" "No unique commits in previous release build."
              fi
            else
              echo "### Changes"
              echo "- No previous successful Desktop release build tag found."
            fi
            echo "${BODY_DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: false
          generate_release_notes: false
          body: ${{ steps.release_body.outputs.body }}

  linux_cpu:
    name: Linux Build (CPU)
    needs: prepare_release
    if: ${{ inputs.build_llama_cpu_linux == true }}
    runs-on: ubuntu-latest
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            llvm-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Configure Linux clang toolchain
        run: |
          echo "CLANG_PATH=$(command -v clang)" >> "$GITHUB_ENV"
          LIBCLANG_PATH="$(dirname "$(find /usr/lib -path '*/libclang.so*' | sort | tail -n1)")"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> "$GITHUB_ENV"
          printf '#include <stdbool.h>\n' | clang -E -x c - >/dev/null

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write Tauri version override
        if: ${{ inputs.version_override != '' }}
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          node -e "require('fs').writeFileSync('tauri-version-override.json', JSON.stringify({ version: process.env.VERSION_OVERRIDE }))"

      - name: Build Tauri binary (Linux, CPU)
        run: |
          BUILD_ARGS=(build)
          if [ -f tauri-version-override.json ]; then
            BUILD_ARGS+=(--config tauri-version-override.json)
          fi
          BUILD_ARGS+=(--no-bundle)
          bun run tauri "${BUILD_ARGS[@]}"

      - name: Bundle Linux CPU deb
        timeout-minutes: 20
        run: |
          BUNDLE_ARGS=(bundle)
          if [ -f tauri-version-override.json ]; then
            BUNDLE_ARGS+=(--config tauri-version-override.json)
          fi
          BUNDLE_ARGS+=(--bundles deb)
          bun run tauri "${BUNDLE_ARGS[@]}"

      - name: Package Linux CPU bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target/release/bundle
          zip -r ../../../../dist-artifacts/linux-cpu.zip .

      - name: Package Linux CPU release tarball
        run: |
          bash scripts/package-linux-release-tarball.sh \
            src-tauri/target/release/bundle \
            cpu \
            dist-artifacts/lettuceai-linux-x86_64-cpu.tar.gz

      - name: Copy Linux CPU deb with stable name
        run: |
          mkdir -p dist-artifacts
          DEB_PATH="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | sort | head -n 1)"
          test -n "${DEB_PATH}"
          cp "${DEB_PATH}" dist-artifacts/lettuceai-linux-x86_64-cpu.deb

      - name: Upload Linux CPU artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            dist-artifacts/linux-cpu.zip
            dist-artifacts/lettuceai-linux-x86_64-cpu.deb
            dist-artifacts/lettuceai-linux-x86_64-cpu.tar.gz
          fail_on_unmatched_files: true

  linux_cuda:
    name: Linux Build (CUDA)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_linux == true }}
    runs-on: ubuntu-latest
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            llvm-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Configure Linux clang toolchain
        run: |
          echo "CLANG_PATH=$(command -v clang)" >> "$GITHUB_ENV"
          LIBCLANG_PATH="$(dirname "$(find /usr/lib -path '*/libclang.so*' | sort | tail -n1)")"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> "$GITHUB_ENV"
          printf '#include <stdbool.h>\n' | clang -E -x c - >/dev/null

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "13.1.0"
          method: "network"

      - name: Verify CUDA toolchain
        run: |
          command -v nvcc >/dev/null 2>&1 || {
            echo "nvcc not found (required for llama-gpu-cuda build).";
            exit 1;
          }
          nvcc --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write Tauri version override
        if: ${{ inputs.version_override != '' }}
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          node -e "require('fs').writeFileSync('tauri-version-override.json', JSON.stringify({ version: process.env.VERSION_OVERRIDE }))"

      - name: Build Tauri binary (Linux, llama.cpp CUDA)
        env:
          CARGO_TARGET_DIR: target-cuda
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_CUDA_FLAGS: "--compiler-options=-fPIC"
        run: |
          BUILD_ARGS=(build)
          if [ -f tauri-version-override.json ]; then
            BUILD_ARGS+=(--config tauri-version-override.json)
          fi
          BUILD_ARGS+=(--features llama-gpu-cuda --no-bundle)
          bun run tauri "${BUILD_ARGS[@]}"

      - name: Bundle Linux CUDA deb
        timeout-minutes: 20
        env:
          CARGO_TARGET_DIR: target-cuda
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_CUDA_FLAGS: "--compiler-options=-fPIC"
        run: |
          BUNDLE_ARGS=(bundle)
          if [ -f tauri-version-override.json ]; then
            BUNDLE_ARGS+=(--config tauri-version-override.json)
          fi
          BUNDLE_ARGS+=(--features llama-gpu-cuda --bundles deb)
          bun run tauri "${BUNDLE_ARGS[@]}"

      - name: Package Linux CUDA bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target-cuda/release/bundle
          zip -r ../../../../dist-artifacts/linux-cuda.zip .

      - name: Package Linux CUDA release tarball
        run: |
          bash scripts/package-linux-release-tarball.sh \
            src-tauri/target-cuda/release/bundle \
            cuda \
            dist-artifacts/lettuceai-linux-x86_64-cuda.tar.gz

      - name: Copy Linux CUDA deb with stable name
        run: |
          mkdir -p dist-artifacts
          DEB_PATH="$(find src-tauri/target-cuda/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | sort | head -n 1)"
          test -n "${DEB_PATH}"
          cp "${DEB_PATH}" dist-artifacts/lettuceai-linux-x86_64-cuda.deb

      - name: Upload Linux CUDA artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            dist-artifacts/linux-cuda.zip
            dist-artifacts/lettuceai-linux-x86_64-cuda.deb
            dist-artifacts/lettuceai-linux-x86_64-cuda.tar.gz
          fail_on_unmatched_files: true

  linux_vulkan:
    name: Linux Build (Vulkan)
    needs: prepare_release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_linux == true }}
    runs-on: ubuntu-latest
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            llvm-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            libvulkan-dev \
            glslc \
            patchelf \
            zip

      - name: Configure Linux clang toolchain
        run: |
          echo "CLANG_PATH=$(command -v clang)" >> "$GITHUB_ENV"
          LIBCLANG_PATH="$(dirname "$(find /usr/lib -path '*/libclang.so*' | sort | tail -n1)")"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> "$GITHUB_ENV"
          printf '#include <stdbool.h>\n' | clang -E -x c - >/dev/null

      - name: Verify Vulkan toolchain
        run: |
          pkg-config --exists vulkan || {
            echo "Vulkan development files not found via pkg-config.";
            exit 1;
          }
          command -v glslc >/dev/null 2>&1 || {
            echo "glslc not found (required for llama-gpu-vulkan build).";
            exit 1;
          }
          glslc --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write Tauri version override
        if: ${{ inputs.version_override != '' }}
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          node -e "require('fs').writeFileSync('tauri-version-override.json', JSON.stringify({ version: process.env.VERSION_OVERRIDE }))"

      - name: Build Tauri binary (Linux, llama.cpp Vulkan)
        env:
          CARGO_TARGET_DIR: target-vulkan
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
        run: |
          BUILD_ARGS=(build)
          if [ -f tauri-version-override.json ]; then
            BUILD_ARGS+=(--config tauri-version-override.json)
          fi
          BUILD_ARGS+=(--features llama-gpu-vulkan --no-bundle)
          bun run tauri "${BUILD_ARGS[@]}"

      - name: Bundle Linux Vulkan deb
        timeout-minutes: 20
        env:
          CARGO_TARGET_DIR: target-vulkan
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
        run: |
          BUNDLE_ARGS=(bundle)
          if [ -f tauri-version-override.json ]; then
            BUNDLE_ARGS+=(--config tauri-version-override.json)
          fi
          BUNDLE_ARGS+=(--features llama-gpu-vulkan --bundles deb)
          bun run tauri "${BUNDLE_ARGS[@]}"

      - name: Package Linux Vulkan bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target-vulkan/release/bundle
          zip -r ../../../../dist-artifacts/linux-vulkan.zip .

      - name: Package Linux Vulkan release tarball
        run: |
          bash scripts/package-linux-release-tarball.sh \
            src-tauri/target-vulkan/release/bundle \
            vulkan \
            dist-artifacts/lettuceai-linux-x86_64-vulkan.tar.gz

      - name: Copy Linux Vulkan deb with stable name
        run: |
          mkdir -p dist-artifacts
          DEB_PATH="$(find src-tauri/target-vulkan/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | sort | head -n 1)"
          test -n "${DEB_PATH}"
          cp "${DEB_PATH}" dist-artifacts/lettuceai-linux-x86_64-vulkan.deb

      - name: Upload Linux Vulkan artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            dist-artifacts/linux-vulkan.zip
            dist-artifacts/lettuceai-linux-x86_64-vulkan.deb
            dist-artifacts/lettuceai-linux-x86_64-vulkan.tar.gz
          fail_on_unmatched_files: true

  windows_cpu:
    name: Windows Build (CPU)
    needs: prepare_release
    if: ${{ inputs.build_llama_cpu_windows == true }}
    runs-on: windows-latest
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Free runner disk space
        shell: pwsh
        run: |
          Write-Host "Disk usage before cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

          $paths = @(
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "C:\Strawberry",
            "C:\ghcup",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\hostedtoolcache\windows\PyPy",
            "C:\hostedtoolcache\windows\go",
            "C:\Program Files\Google\Chrome",
            "C:\Program Files (x86)\Microsoft\Edge",
            "C:\Program Files\Mozilla Firefox"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $p
            }
          }

          Write-Host "Disk usage after cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Ensure Chocolatey
        shell: pwsh
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco --version

      - name: Install LLVM (libclang)
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

