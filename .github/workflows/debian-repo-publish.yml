name: Prepare / Publish / Debian Repo

run-name: Debian repo ${{ inputs.variant }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      asset_url:
        description: "Direct HTTPS URL to the .deb release asset"
        required: true
        type: string
      variant:
        description: "Desktop variant to publish"
        required: true
        default: cpu
        type: choice
        options:
          - cpu
          - vulkan
          - cuda
      suite:
        description: "APT suite/codename to write"
        required: false
        default: stable
        type: string
      component:
        description: "APT component to write"
        required: false
        default: main
        type: string
      publish:
        description: "Commit repo metadata to gh-pages"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Debian repo tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev xz-utils gnupg

      - name: Prepare gh-pages worktree
        if: ${{ inputs.publish == true }}
        run: |
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            cd gh-pages-worktree
            git checkout --orphan gh-pages
            rm -rf ./*
            touch .nojekyll
          fi

      - name: Prepare local repo dir
        if: ${{ inputs.publish != true }}
        run: |
          mkdir -p gh-pages-worktree
          touch gh-pages-worktree/.nojekyll

      - name: Build Debian repo tree
        env:
          DEBIAN_REPO_GPG_PRIVATE_KEY: ${{ secrets.DEBIAN_REPO_GPG_PRIVATE_KEY }}
          DEBIAN_REPO_GPG_PASSPHRASE: ${{ secrets.DEBIAN_REPO_GPG_PASSPHRASE }}
        run: |
          bash scripts/publish-debian-repo.sh \
            '${{ inputs.asset_url }}' \
            '${{ inputs.variant }}' \
            gh-pages-worktree \
            'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}' \
            '${{ inputs.suite }}' \
            '${{ inputs.component }}' \
            'LettuceAI'

      - name: Upload generated Debian repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-repo-${{ inputs.variant }}
          path: |
            gh-pages-worktree/apt/${{ inputs.variant }}
          if-no-files-found: error

      - name: Append workflow summary
        run: |
          {
            echo "## Debian repo"
            echo "- variant: \`${{ inputs.variant }}\`"
            echo "- suite: \`${{ inputs.suite }}\`"
            echo "- component: \`${{ inputs.component }}\`"
            echo "- asset: ${{ inputs.asset_url }}"
            echo
            echo 'APT source:'
            echo '```'
            echo "deb [arch=amd64] https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt/${{ inputs.variant }} ${{ inputs.suite }} ${{ inputs.component }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push gh-pages
        if: ${{ inputs.publish == true }}
        run: |
          cd gh-pages-worktree
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .nojekyll apt
          if git diff --cached --quiet; then
            echo "No Debian repo changes to publish."
            exit 0
          fi
          git commit -m "Publish Debian repo for ${{ inputs.variant }} (${{ inputs.suite }})"
          git push origin HEAD:gh-pages
